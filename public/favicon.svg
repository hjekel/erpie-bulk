<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Bar chart representing pricing tiers -->
  <rect x="5" y="18" width="5" height="9" rx="1" fill="#ff9900" opacity="0.7"/>
  <rect x="13" y="12" width="5" height="15" rx="1" fill="#ff9900" opacity="0.85"/>
  <rect x="21" y="6" width="5" height="21" rx="1" fill="#ff9900"/>
  <!-- Euro symbol overlay -->
  <text x="16" y="22" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">€</text>
</svg>
